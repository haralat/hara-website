<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARA — Cold Universe</title>
<meta name="description" content="HARA — Specialty cold drip coffee y gelato artesanal desde Salta, Argentina. Welcome to the Cold Universe.">
<meta property="og:title" content="HARA — Cold Universe">
<meta property="og:description" content="Specialty cold drip coffee y gelato artesanal desde Salta, Argentina.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hara.lat">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cloud-milk: #F9F8F6;
  --cold-brew: #0E0E10;
  --cacao: #3A2B23;
  --copper: #B07A5E;
  --copper-light: #C4957A;
  --copper-glow: rgba(176,122,94,0.15);
  --andes-sky: #CFE6F3;
  --warm-stone: #E8E2DA;
  --terracotta: #C4704B;
  --sage: #8A9A7B;
  --cream: #F5F0E8;
  --ice: #a0c8e0;
  --ice-deep: #5a8aa0;
  --ice-glow: rgba(90,138,160,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cloud-milk);
  color: var(--cold-brew);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ====== NAV ====== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 48px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(14,14,16,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 6px;
  color: var(--cloud-milk);
  text-decoration: none;
}
.nav-logo span { color: var(--copper); }

.nav-right {
  display: flex;
  gap: 24px;
  align-items: center;
}

.nav-links {
  display: flex;
  gap: 36px;
  align-items: center;
}

.nav-links a {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(249,248,246,0.6);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--cloud-milk); }

.nav-cta {
  padding: 10px 24px;
  border: 1px solid var(--copper);
  color: var(--copper) !important;
  transition: all 0.3s;
}
.nav-cta:hover {
  background: var(--copper);
  color: var(--cloud-milk) !important;
}

/* Language Switcher */
.lang-switcher {
  display: flex;
  gap: 2px;
  background: rgba(249,248,246,0.06);
  border-radius: 4px;
  padding: 2px;
}

.lang-btn {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(249,248,246,0.35);
  background: transparent;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 3px;
  font-family: 'DM Sans', sans-serif;
}
.lang-btn:hover { color: rgba(249,248,246,0.7); }
.lang-btn.active {
  color: var(--cloud-milk);
  background: rgba(249,248,246,0.1);
}

/* ====== HERO ====== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 120px 48px 80px;
  background: var(--cold-brew);
  color: var(--cloud-milk);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -20%; left: -10%;
  width: 60%; height: 80%;
  background: radial-gradient(ellipse, var(--copper-glow) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -10%; right: -5%;
  width: 50%; height: 60%;
  background: radial-gradient(ellipse, var(--ice-glow) 0%, transparent 65%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
}

.hero-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--copper);
  border: 1px solid rgba(176,122,94,0.3);
  padding: 8px 20px;
  margin-bottom: 48px;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 8vw, 110px);
  font-weight: 300;
  letter-spacing: 14px;
  line-height: 1.05;
  margin-bottom: 12px;
}
.hero-title .accent {
  color: var(--copper);
  font-style: italic;
  font-weight: 400;
}

.hero-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 300;
  font-style: italic;
  color: var(--ice);
  letter-spacing: 3px;
  margin-bottom: 48px;
}

.hero-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ice-deep), transparent);
  margin: 0 auto 48px;
}

.hero-sub {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 1.5px;
  color: rgba(249,248,246,0.45);
  line-height: 2;
  max-width: 520px;
  margin: 0 auto 56px;
}

.hero-ctas {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--cold-brew);
  background: var(--copper);
  padding: 16px 36px;
  transition: all 0.4s;
}
.btn-primary:hover {
  background: var(--copper-light);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(176,122,94,0.3);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--cloud-milk);
  border: 1px solid rgba(249,248,246,0.2);
  padding: 16px 36px;
  transition: all 0.4s;
}
.btn-secondary:hover {
  border-color: var(--copper);
  color: var(--copper);
  transform: translateY(-2px);
}

/* ====== PHILOSOPHY ====== */
.philosophy {
  padding: 140px 48px;
  background: var(--cold-brew);
  position: relative;
}

.philosophy::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(90,138,160,0.25), transparent);
}

.phil-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 100px;
  align-items: center;
}

.phil-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--ice-deep);
  margin-bottom: 32px;
}

.phil-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 4vw, 56px);
  font-weight: 300;
  color: var(--cloud-milk);
  line-height: 1.2;
  margin-bottom: 32px;
}
.phil-title em { font-style: italic; color: var(--ice); }

.phil-body {
  font-size: 14px;
  font-weight: 300;
  color: rgba(249,248,246,0.55);
  line-height: 2;
  max-width: 480px;
}
.phil-body + .phil-body { margin-top: 24px; }

.brand-circles {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 0 auto;
}

.brand-circle {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: transform 0.4s;
}
.brand-circle:hover { transform: scale(1.05); }

.circle-craft {
  width: 220px; height: 220px;
  top: 0; left: 50%; transform: translateX(-50%);
  border-color: rgba(160,200,224,0.3);
  background: radial-gradient(circle, rgba(160,200,224,0.08) 0%, transparent 70%);
}
.circle-fusion {
  width: 220px; height: 220px;
  bottom: 0; left: 10px;
  border-color: rgba(176,122,94,0.3);
  background: radial-gradient(circle, rgba(176,122,94,0.06) 0%, transparent 70%);
}
.circle-origin {
  width: 220px; height: 220px;
  bottom: 0; right: 10px;
  border-color: rgba(138,154,123,0.25);
  background: radial-gradient(circle, rgba(138,154,123,0.06) 0%, transparent 70%);
}

.circle-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.circle-craft .circle-label { color: var(--ice); }
.circle-fusion .circle-label { color: var(--copper); }
.circle-origin .circle-label { color: var(--sage); }

.circle-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  margin-top: 6px;
  color: rgba(249,248,246,0.5);
}

/* ====== BRAND STORY ====== */
.story {
  background: var(--cloud-milk);
  position: relative;
}

.story::before {
  content: '';
  position: absolute;
  top: -2px; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, var(--cold-brew), var(--cloud-milk));
  pointer-events: none;
}

.story-intro {
  padding: 180px 48px 100px;
  text-align: center;
}

.story-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 32px;
}

.story-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 300;
  color: var(--cacao);
  line-height: 1.3;
  max-width: 700px;
  margin: 0 auto 40px;
}
.story-heading em { font-style: italic; color: var(--copper); }

.story-desc {
  font-size: 14px;
  font-weight: 300;
  color: rgba(58,43,35,0.6);
  line-height: 2;
  max-width: 560px;
  margin: 0 auto;
}

.pillars {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 48px 140px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 48px;
}

.pillar {
  padding: 48px 36px;
  border: 1px solid rgba(58,43,35,0.08);
  background: white;
  transition: all 0.4s;
}
.pillar:hover {
  transform: translateY(-8px);
  box-shadow: 0 24px 60px rgba(58,43,35,0.08);
  border-color: rgba(176,122,94,0.2);
}

.pillar-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 24px;
}
.pillar:nth-child(1) .pillar-number { color: var(--ice-deep); }
.pillar:nth-child(2) .pillar-number { color: var(--copper); }
.pillar:nth-child(3) .pillar-number { color: var(--sage); }

.pillar-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cacao);
  margin-bottom: 8px;
}

.pillar-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  color: var(--copper);
  margin-bottom: 24px;
}
.pillar:nth-child(1) .pillar-subtitle { color: var(--ice-deep); }

.pillar-line { width: 32px; height: 1px; margin-bottom: 24px; }
.pillar:nth-child(1) .pillar-line { background: var(--ice-deep); }
.pillar:nth-child(2) .pillar-line { background: var(--copper); }
.pillar:nth-child(3) .pillar-line { background: var(--sage); }

.pillar-text {
  font-size: 13.5px;
  font-weight: 300;
  color: rgba(58,43,35,0.6);
  line-height: 1.9;
}

.pillar-quote {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(58,43,35,0.06);
  font-family: 'Noto Sans KR', 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  color: var(--cacao);
}

/* ====== PRODUCTS ====== */
.products {
  padding: 120px 48px;
  background: var(--warm-stone);
}

.products-inner { max-width: 1200px; margin: 0 auto; }
.products-header { text-align: center; margin-bottom: 80px; }

.products-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 24px;
}

.products-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 300;
  color: var(--cacao);
}

.product-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.product-card {
  background: var(--cloud-milk);
  padding: 56px 48px;
  transition: all 0.4s;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(58,43,35,0.1);
}

.product-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
  font-size: 20px;
}
.product-card:first-child .product-icon { background: rgba(90,138,160,0.1); }
.product-card:last-child .product-icon { background: rgba(196,112,75,0.1); }

.product-name {
  font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--cacao); margin-bottom: 8px;
}

.product-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400;
  color: var(--copper); margin-bottom: 24px; line-height: 1.3;
}
.product-card:first-child .product-tagline { color: var(--ice-deep); }

.product-desc {
  font-size: 13.5px; font-weight: 300;
  color: rgba(58,43,35,0.55); line-height: 1.9;
}

.product-tag {
  display: inline-block; margin-top: 28px;
  font-size: 10px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--copper);
  border: 1px solid rgba(176,122,94,0.25);
  padding: 6px 16px;
}

/* ====== B2B ====== */
.b2b {
  padding: 140px 48px;
  background: var(--cacao);
  color: var(--cloud-milk);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.b2b::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(176,122,94,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.b2b-content { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }

.b2b-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--copper); margin-bottom: 32px;
}

.b2b-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 300; line-height: 1.3; margin-bottom: 24px;
}
.b2b-title em { font-style: italic; color: var(--copper-light); }

.b2b-desc {
  font-size: 14px; font-weight: 300;
  color: rgba(249,248,246,0.5);
  line-height: 2; margin-bottom: 48px;
}

.b2b-cta {
  display: inline-flex; align-items: center; gap: 12px;
  font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  text-decoration: none;
  color: var(--cacao); background: var(--copper);
  padding: 18px 40px; transition: all 0.4s;
}
.b2b-cta:hover {
  background: var(--copper-light);
  transform: translateY(-2px);
  box-shadow: 0 16px 48px rgba(176,122,94,0.3);
}

.b2b-note {
  margin-top: 32px; font-size: 12px;
  color: rgba(249,248,246,0.3);
}
.b2b-note a { color: rgba(249,248,246,0.3); text-decoration: none; }
.b2b-note a:hover { color: var(--copper); }

/* ====== FOOTER ====== */
footer {
  padding: 60px 48px;
  background: var(--cold-brew);
  color: var(--cloud-milk);
}

.footer-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}

.footer-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; letter-spacing: 6px;
}
.footer-logo span { color: var(--copper); }

.footer-tagline {
  font-size: 11px; font-weight: 300;
  letter-spacing: 2px; color: var(--ice-deep);
  margin-top: 4px;
}

.footer-location {
  font-size: 12px; font-weight: 300;
  color: rgba(249,248,246,0.35);
  letter-spacing: 1px; margin-bottom: 4px; text-align: right;
}

.footer-copy {
  font-size: 11px; color: rgba(249,248,246,0.2); text-align: right;
}

.footer-divider {
  width: 100%; height: 1px;
  background: rgba(249,248,246,0.06);
  max-width: 1200px; margin: 32px auto 24px;
}

.footer-bottom {
  max-width: 1200px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}

.footer-social { display: flex; gap: 24px; }
.footer-social a {
  font-size: 12px; color: rgba(249,248,246,0.3);
  text-decoration: none; letter-spacing: 1px; transition: color 0.3s;
}
.footer-social a:hover { color: var(--copper); }

.footer-universe {
  font-size: 11px; color: rgba(249,248,246,0.15);
  letter-spacing: 2px;
}

/* ====== HAMBURGER MENU ====== */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1100;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--cloud-milk);
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  transform-origin: center;
}
.hamburger.open span:nth-child(1) {
  transform: translateY(6.5px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-6.5px) rotate(-45deg);
}

/* Mobile overlay menu */
.mobile-menu {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 999;
  background: rgba(14,14,16,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.mobile-menu.open {
  display: flex;
  opacity: 1;
}
.mobile-menu a {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(249,248,246,0.5);
  text-decoration: none;
  padding: 20px 48px;
  width: 100%;
  text-align: center;
  transition: color 0.3s;
  border-bottom: 1px solid rgba(249,248,246,0.05);
}
.mobile-menu a:first-child {
  border-top: 1px solid rgba(249,248,246,0.05);
}
.mobile-menu a:hover { color: var(--cloud-milk); }
.mobile-menu .mobile-cta {
  color: var(--copper) !important;
  border-color: transparent !important;
  margin-top: 8px;
}
.mobile-menu .mobile-lang {
  margin-top: 32px;
  display: flex;
  gap: 2px;
  background: rgba(249,248,246,0.06);
  border-radius: 4px;
  padding: 2px;
}
.mobile-menu .mobile-lang button {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(249,248,246,0.35);
  background: transparent;
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 3px;
  font-family: 'DM Sans', sans-serif;
}
.mobile-menu .mobile-lang button.active {
  color: var(--cloud-milk);
  background: rgba(249,248,246,0.1);
}

/* ====== RESPONSIVE ====== */
@media (max-width: 1024px) {
  .phil-grid { grid-template-columns: 1fr; gap: 60px; text-align: center; }
  .phil-body { margin: 0 auto; }
  .pillars { grid-template-columns: 1fr; max-width: 600px; }
}

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .nav-links { display: none; }
  .hamburger { display: flex; }

function setLang(lang){
  document.documentElement.lang=lang==='ko'?'ko':lang==='pt'?'pt-BR':lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(L[lang]&&L[lang][k])el.textContent=L[lang][k];});
  document.querySelectorAll('[data-h]').forEach(el=>{const k=el.getAttribute('data-h');if(L[lang]&&L[lang][k])el.innerHTML=L[lang][k];});
  // b2b_title and story_heading and phil_title contain HTML
  ['b2b_title','story_heading','phil_title'].forEach(k=>{
    const el=document.querySelector('[data-h="'+k+'"]');
    if(el&&L[lang]&&L[lang][k])el.innerHTML=L[lang][k];
  });
  // hero_sub contains <br>
  const hs=document.querySelector('[data-h="hero_sub"]');
  if(hs&&L[lang])hs.innerHTML=L[lang].hero_sub;
  try{localStorage.setItem('hara-lang',lang);}catch(e){}
}

// Hamburger menu
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

function closeMobileMenu() {
  hamburger.classList.remove('open');
  mobileMenu.classList.remove('open');
  document.body.style.overflow = '';
}

hamburger.addEventListener('click', () => {
  const isOpen = mobileMenu.classList.contains('open');
  if (isOpen) {
    closeMobileMenu();
  } else {
    hamburger.classList.add('open');
    mobileMenu.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
});

document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

// Init
(function(){
  let lang='es';
  try{const s=localStorage.getItem('hara-lang');if(s&&L[s])lang=s;}catch(e){}
  setLang(lang);
})();
</script>
